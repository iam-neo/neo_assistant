<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Assistant - Documentation</title>
    <meta name="description" content="Changelog and documentation logs for the Neo Assistant offline AI project.">
    <!-- Modern Typography: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Immersive Background Layers -->
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <header>
        <div class="container header-container">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>Neo <span class="highlight">Assistant</span></h1>
            </div>
            <p class="subtitle">System Documentation & Visual Update Logs</p>
        </div>
    </header>

    <main class="container">
        <section class="timeline-section">
            <div class="timeline-header">
                <h2>Project Updates</h2>
                <div class="line"></div>
            </div>
            
            <!-- JS dynamically injects the update cards here -->
            <div id="updates-container" class="updates-container"></div>
        </section>
    </main>

    <footer>
        <p>Offline AI Command System • Built with 🐍 Python</p>
    </footer>

    <!-- Logic Layer -->
    <script src="script.js"></script>
</body>
</html>
